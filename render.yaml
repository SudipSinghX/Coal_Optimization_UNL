services:
  - type: web
    name: codsp-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      # Render automatically injects DATABASE_URL for linked PostgreSQL databases.
      # The backend normalises the scheme from postgres:// -> postgresql+psycopg://
      # at startup so no manual overriding is needed here.
      - key: DATABASE_URL
        fromDatabase:
          name: codsp-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      # CORS: add the Vercel URL of your frontend here (comma-separated).
      - key: CORS_ORIGINS
        value: https://coal-optimization-unl.vercel.app
    healthCheckPath: /health

databases:
  - name: codsp-db
    databaseName: codsp_db
    user: codsp_user
    plan: free
